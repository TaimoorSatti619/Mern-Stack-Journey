<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card 1</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color: #0093E9;
            background-image: linear-gradient(160deg, #0093E9 0%, #80D0C7 100%);

            
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            width: 260px;
            height: 470px;
            background-color: white;
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 20px;
        }
        .card img{
            height: 50%;
            border-radius: 10px;
        }
        .card h2{
            font-weight: bold;
            font-size: 1.3rem;
        }
        .card p{
            font-size: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="images/qrcode.jpg">
            <h2>Improve Your Frontend Skills by developing Projects</h2>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Dolorum repudiandae recusandae repellat earum? Facilis ipsum modi eligendi aliquid.</p>
        </div>
    </div>
</body>
</html>
