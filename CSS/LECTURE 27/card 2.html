<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card 2</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color: #74EBD5;
            background-image: linear-gradient(90deg, #74EBD5 0%, #9FACE6 100%);          
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            width: 300px;
            height: 540px;
            background-color: white;
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        .card img{
            width: 100%;
            height: 30%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        #text{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 70%;
            text-align: center;
        }
        #box{
            width: 80%;
            height: 10%;
            background-color: #66beb4;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 20px;
            padding-left: 5px;
        }
        #leftbox{
            display: flex;
            height: 100%;
            gap: 10px;
            align-items: center;
        }
        #imagebox img{
            width: 3rem;
            height: 3rem;
        }
        #leftbox p{
            font-weight: bold;
        }
        #button{
            width: 80%;
            height: 9%;
            background-color: rgb(46, 46, 122);
            border-radius: 10px;
            color: white;
            box-shadow: rgba(0, 0, 0, 0.3) 0px 19px 38px, rgba(0, 0, 0, 0.22) 0px 15px 12px;        }
        #cancelbox a{
            text-decoration: none;
            color: rgb(58, 48, 48);
            font-weight: bold;
            font-size: large;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="images/icon.jpg">
            <div id="text">
                <h2>Order Summary</h2>
                <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Delectus quibusdam consequuntur provident placeat, id eligendi alias</p>
            </div>
            <div id="box">
                <div id="leftbox">
                    <div id="imagebox">
                        <img src="images/music.png" alt="">
                    </div>
                    <div id="textbox">
                        <p>Amount</p>
                        <p>$99.9/year</p>
                    </div>
                </div>
                <div id="rightbox">
                    <a href="#">Change</a>
                </div>
            </div>
            <button id="button">
                Proceed to Payment
            </button>
            <div id="cancelbox">
                <a href="">Cancel Order</a>
            </div>
        </div>
    </div>
</body>
</html>
