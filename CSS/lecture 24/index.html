<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transition</title>
    <style>
        .box{
            /* border: 2px solid black; */
            background-color: white;
            width: 100px;
            height: 100px;
            text-align: center;

            transition-property: all;
            transition-duration: 5s;
            transition-delay: 1s;
            transition-timing-function: linear;
        }
        .box:hover{
            width: 200px;
            height: 200px;
            background-color: aqua;
            border-radius: 100px;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <div class="box">
        <h3>Alien</h3>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Dolorum soluta distinctio sit cumque laboriosam, minus blanditiis aperiam! Magnam, odio deleniti?</p>
    </div>
</body>
</html>
