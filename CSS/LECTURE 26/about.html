<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>about</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    }
.container{
    height: 100%;
    width: 100%;
    overflow-x: none;
    background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
    }

.navcontainer{
    width: 100%;
    background-color: #2e5065;
    background-image: linear-gradient(160deg, #2e5065 0%, #86d8ce 100%);
    
    min-height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}
nav{
    width: 100%;
    padding-right: 2rem;
}
#navlist{
    width: 100%;
    padding: 15px;
    list-style: none;
    font-size: 2.3rem;
    display: flex;
    justify-content: space-around;
    align-items: center;
}
#logo{
    font-size: 2.3rem;
    color: azure;
}
#logo:hover{
    background-color: rgba(78, 76, 76, 0.548);
    border-radius: 5px; 
}
a{
    text-decoration: none;
    color: azure;
}
.navitems{
    display: flex;
    gap: 40px;
    
}
.navitems a:hover{
    background-color: rgba(78, 76, 76, 0.548);
    border-radius: 5px;
}
/* //////////////////////////////////////////////////////////////// */
.footerbox{
    background-color: #2e5065;
    background-image: linear-gradient(160deg, #2e5065 0%, #86d8ce 100%);
    
    width: 100%;
    text-align: center;
    min-height: 20px;
}
.footerbox{
    color: azure;
    font-size: 1.7rem;
}


.contentbox{
    width: 60%;
    margin: auto;
    /* border: 1px solid black; */
    background: rgba(255, 251, 0, 0.342);
    display: flex;
    flex-direction: column;
    gap: 80px;
    /* padding: 3rem; */
    box-shadow: 0px 0px 30px black;
}
</style>
</head>
<body>
    <div class="container">
        <!-- navigation bar ////////////////////////////// -->
     <header>
         <div class="navcontainer">
             <nav>
                 <ul id="navlist">
                     <li>
                         <p id="logo">ALIEN RECIPIES</p>
                     </li>
                     <li>
                         <div class="navitems">
                             <a href="index.html">Home</a>
                             <a href="#">Contact</a>
                             <a href="#">About</a>
                         </div>
                     </li>
                 </ul>
             </nav>
         </div>
     </header>
     <main>
        <div class="contentbox">
        </div>
     </main>



     <footer>
        <div class="footerbox">
            <p>Copyright © Alien Recipies Pvt ltd 2024 All Rights Reserved</p>
        </div>
    </footer>
    </div>
</body>
</html>
