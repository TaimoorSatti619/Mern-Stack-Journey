<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form One</title>
</head>
<body>
    <h2>Event Registration</h2>
    <form>
        <label for="name">Name :</label>
        <input type="text" name="name" id="name" >
        <br/>
        <br/>
        <label for="email">Email :</label>
        <input type="email" name="email" id="email" >
        <br/>
        <br/>
        <label for="phone">Phone :</label>
        <input type="tel" name="phone" id="phone" >
        <br/>
        <br/>
        <label for="occupation">Occupation :</label>
        <select name="occupation" id="occupation">
            <option value="student">Student</option>
            <option value="professional">Professional</option>
            <option value="other">Other</option>
        </select>
        <br/>
        <br/>
        <fieldset>
            <legend>Topics of Interest</legend>
            <label for="html">Html</label>
            <input type="checkbox" name="interset" id="html">

            <label for="css">CSS</label>
            <input type="checkbox" name="interset" id="css">

            <label for="java">Javascript</label>
            <input type="checkbox" name="interset" id="java">
        </fieldset>
        <br/>
        <label for="textarea">Comments :</label>
        <br/>
        <textarea name="textarea" id="textarea" cols="30" rows="10"></textarea>

        <input type="submit" value="Register">
    </form>
</body>
</html>
