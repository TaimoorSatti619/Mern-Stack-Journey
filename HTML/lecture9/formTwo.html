<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Two</title>
</head>
<body>
    <form>
        <label for="name">Name :</label>
        <input type="text" name="name" id="name" >
        <br/>
        <br/>
        <label for="email">Email :</label>
        <input type="email" name="email" id="email" >
        <br/>
        <br/>
        <label for="phone">Phone :</label>
        <input type="tel" name="phone" id="phone" >
        <br/>
        <br/>
        <label for="file">Resume :</label>
        <input type="file" id="file">
        <br/>
        <br/>
        <label for="exp">Experience (Years) :</label>
        <input type="number" name="exp" id="exp" max="50" min="0">
        <br/>
        <br/>
        <fieldset>
            <legend>Skills</legend>
            <label for="html">Html</label>
            <input type="checkbox" name="interset" id="html">

            <label for="css">CSS</label>
            <input type="checkbox" name="interset" id="css">

            <label for="java">Javascript</label>
            <input type="checkbox" name="interset" id="java">
        </fieldset>
        <br/>
        <label for="edu">Highest Education:</label>
        <select name="edu" id="edu">
            <option value="a">HighSchool</option>
            <option value="b">Collage</option>
            <option value="c">Bachelor</option>
            <option value="d">MAster</option>
            <option value="e">PHD</option>
        </select>
        <br/>
        <br/>
        <p>Availability :</p>
        <label for="full">Full-Time</label>
        <input type="radio" name="radio" id="full">

        <label for="part">Part-Time :</label>
        <input type="radio" name="radio" id="part">
        <br/>
        <br/>
        <label for="textarea">Additional Comments :</label>
        <br/>
        <textarea name="textarea" id="textarea" cols="30" rows="10"></textarea>
        <br/>
        <br/>
        <input type="submit" value="Submit Application">

        

    </form>
</body>
</html>
