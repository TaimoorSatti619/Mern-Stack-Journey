<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up page</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Signup Form</legend>
            <h2>Enter your Information</h2>
            <label for="name">First Name :</label>
            <input type="text" id="name" placeholder="abc">
            <label for="Lname">Last Name :</label>
            <input type="text" id="Lname" placeholder="def">
            <br>
            <br>
            <label for="email">Email :</label>
            <input type="email" id="email" placeholder="abc@gmail.com">
            <label for="phone">Phone No :</label>
            <input type="tel" id="phone" placeholder="03xxxxxxxx">
            <br>
            <br>
            <label for="address">Address :</label>
            <input type="text" id="address" placeholder="st ##,h##,city xxx">
            <label for="code">Postal Code :</label>
            <input type="text" id="code" placeholder="1010">
            <br>
            <br>
            <label for="DOB">Date of Birth :</label>
            <input type="date" id="DOB">
            <label for="radio1">Male </label>
            <input type="radio" name="gender" id="radio1">
            <label for="radio2">Female </label>
            <input type="radio" name="gender" id="radio2">
            <label for="radio3">Prefer not to say</label>
            <input type="radio" name="gender" id="radio3">
            <br>
            <br>
            <fieldset>
                <legend>Select Your Education</legend>
                <label for="radio4">Matric </label>
                <input type="radio" name="Education" id="radio4">
                <label for="radio5">Intermediate </label>
                <input type="radio" name="Education" id="radio5">
                <label for="radio6">Bachelor </label>
                <input type="radio" name="Education" id="radio6">
            </fieldset>
            <br>
            <fieldset>
                <legend>Select Languages</legend>
                <label for="check1">English </label>
                <input type="checkbox" name="language" id="check1">
                <label for="check2">Urdu </label>
                <input type="checkbox" name="language" id="check2">
                <label for="check3">Arabic </label>
                <input type="checkbox" name="language" id="check3">
            </fieldset>
            <br>
            <fieldset>
                <legend>Skills</legend>
                <label for="c++">C++</label>
                <input type="checkbox" name="skill" id="c++">
                <label for="python">Python</label>
                <input type="checkbox" name="skill" id="python">
                <label for="java">Java</label>
                <input type="checkbox" name="skill" id="java">
                <label for="web">Web Development</label>
                <input type="checkbox" name="skill" id="web">
                <label for="dsa">DSA</label>
                <input type="checkbox" name="skill" id="dsa">
                <label for="design">Graphic Designing</label>
                <input type="checkbox" name="skill" id="design">
            </fieldset>
            <br>
            <fieldset>
                <legend>Experience</legend>
                <label for="1">2 Years</label>
                <input type="radio" name="exp" id="1">
                <label for="2">5 Years</label>
                <input type="radio" name="exp" id="2">
                <label for="3">Kuch nhi</label>
                <input type="radio" name="exp" id="3">
            </fieldset>

            <br>
            <label for="fileselect">Profile Picture :</label>
            <input type="file"id="fileselect">
            <br>
            <br>
            <label for="password">Password :</label>
            <input type="password"id="password">
            <button>Signup</button>
            <button>Clear</button>
            <a href="login.html">Already have an Account</a>
        </fieldset>
    </form>
</body>
</html>
